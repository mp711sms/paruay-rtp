<style>
:root {
  --bg: #080808;
  --surface: #111111;
  --surface2: #181818;
  --surface3: #222222;
  --gold: #f5c518;
  --gold2: #d4a017;
  --gold3: #b8860b;
  --gold-dim: #7a5a0a;
  --gold-glow: rgba(245,197,24,0.3);
  --crimson: #c8102e;
  --crimson-dark: #8b0000;
  --text: #f0ead6;
  --text-muted: #7a7065;
  --radius: 14px;
  --card-radius: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background-color: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(180,130,0,0.08) 0%, transparent 70%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23f5c518' fill-opacity='0.03'%3E%3Cpath d='M30 0L60 30L30 60L0 30z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  color: var(--text);
  font-family: 'Sarabun', sans-serif;
  min-height: 100vh;
  line-height: 1.4;
}

/* ── HEADER ── */
#header {
  position: relative;
  text-align: center;
  padding: 28px 20px 18px;
  border-bottom: 1px solid rgba(245,197,24,0.12);
  background: linear-gradient(180deg, rgba(180,130,0,0.06) 0%, transparent 100%);
  overflow: hidden;
}
#header::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 80% at 50% -20%, rgba(245,197,24,0.07) 0%, transparent 70%);
  pointer-events: none;
}

/* Lotus decorative SVG corners */
.lotus-left, .lotus-right {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  opacity: 0.18;
  width: 90px;
}
.lotus-left { left: 20px; }
.lotus-right { right: 20px; transform: translateY(-50%) scaleX(-1); }

.brand-logo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 2rem;
  font-weight: 700;
  background: linear-gradient(135deg, #b8860b 0%, #f5c518 40%, #fffacd 60%, #d4a017 80%, #b8860b 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.05em;
  text-shadow: none;
  filter: drop-shadow(0 0 20px rgba(245,197,24,0.4));
  line-height: 1;
}
.brand-th {
  font-size: 0.9rem;
  color: var(--gold2);
  letter-spacing: 0.3em;
  margin-top: 2px;
  font-weight: 400;
  opacity: 0.8;
}
.main-title {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text);
  margin-top: 10px;
  letter-spacing: 0.02em;
}
.main-subtitle {
  font-size: 0.72rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-top: 4px;
}
.thai-date {
  display: inline-block;
  background: linear-gradient(90deg, var(--crimson-dark), var(--crimson), var(--crimson-dark));
  color: #fff;
  font-size: 0.82rem;
  font-weight: 600;
  padding: 5px 18px;
  border-radius: 20px;
  margin-top: 10px;
  letter-spacing: 0.05em;
  box-shadow: 0 2px 12px rgba(200,16,46,0.4);
}

/* ── CONTROLS (hidden gear menu, top-right of header) ── */
#ctrl-gear {
  position: absolute;
  top: 14px; right: 16px;
  z-index: 20;
}
#ctrl-gear-btn {
  background: rgba(245,197,24,0.07);
  border: 1px solid rgba(245,197,24,0.15);
  color: rgba(245,197,24,0.4);
  width: 32px; height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 0.95rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  line-height: 1;
}
#ctrl-gear-btn:hover {
  color: var(--gold);
  border-color: rgba(245,197,24,0.4);
  background: rgba(245,197,24,0.12);
}
#ctrl-dropdown {
  position: absolute;
  top: 38px; right: 0;
  background: #161410;
  border: 1px solid rgba(245,197,24,0.18);
  border-radius: 10px;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 140px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.7);
  opacity: 0;
  pointer-events: none;
  transform: translateY(-6px);
  transition: opacity 0.18s, transform 0.18s;
}
#ctrl-dropdown.open {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}
.ctrl-btn {
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-family: 'Sarabun', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 7px 12px;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.ctrl-btn:hover { background: rgba(245,197,24,0.08); color: var(--gold); }
.ctrl-btn.primary { color: #ff6b6b; }
.ctrl-btn.primary:hover { background: rgba(200,16,46,0.12); color: #ff8888; }
/* screenshot mode */
body.screenshot-mode #ctrl-gear { display: none; }

/* ── PROVIDER FILTER ── */
#filter-zone {
  max-width: 1060px;
  margin: 16px auto 0;
  padding: 0 20px;
}
.filter-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.filter-label {
  font-size: 0.68rem;
  color: var(--gold2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 600;
}
.filter-divider {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(245,197,24,0.3), transparent);
}
#btn-all {
  background: transparent;
  border: 1.5px solid var(--gold);
  color: var(--gold);
  font-family: 'Sarabun', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  padding: 6px 18px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}
#btn-all.active, #btn-all:hover {
  background: var(--gold);
  color: #000;
  box-shadow: 0 0 16px rgba(245,197,24,0.35);
}
#provider-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.35s ease, opacity 0.3s ease;
}
#provider-buttons.open {
  max-height: 120px;
  opacity: 1;
  margin-bottom: 12px;
}
.prov-btn {
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-muted);
  font-family: 'Sarabun', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.03em;
}
.prov-btn:hover { border-color: var(--gold2); color: var(--gold2); }
.prov-btn.active {
  background: linear-gradient(90deg, rgba(245,197,24,0.15), rgba(245,197,24,0.08));
  border-color: var(--gold);
  color: var(--gold);
}

/* ── ACTIVE FILTER BANNER ── */
#active-provider-banner {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  background: linear-gradient(90deg, rgba(245,197,24,0.08), transparent);
  border-left: 3px solid var(--gold);
  border-radius: 0 8px 8px 0;
  margin-bottom: 12px;
  font-size: 0.78rem;
  color: var(--gold2);
}
#active-provider-banner.visible { display: flex; }
.banner-dot {
  width: 7px; height: 7px;
  background: var(--gold);
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }

/* ── GAME GRID ── */
#game-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
  max-width: 1060px;
  margin: 0 auto;
  padding: 16px 20px 40px;
}
@media (max-width: 940px) { #game-grid { grid-template-columns: repeat(4,1fr); } }
@media (max-width: 700px) { #game-grid { grid-template-columns: repeat(3,1fr); } }
@media (max-width: 480px) { #game-grid { grid-template-columns: repeat(2,1fr); } }

/* ── GAME CARD ── */
.game-card {
  position: relative;
  border-radius: var(--card-radius);
  overflow: hidden;
  border: 1px solid rgba(245,197,24,0.1);
  transition: transform 0.22s cubic-bezier(.2,.8,.3,1.2), box-shadow 0.22s ease;
  cursor: pointer;
}
.game-card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 12px 32px rgba(245,197,24,0.18), 0 4px 12px rgba(0,0,0,0.6);
  border-color: rgba(245,197,24,0.35);
  z-index: 2;
}
.game-card.is-hot {
  border-color: rgba(200,16,46,0.35);
  box-shadow: 0 0 0 1px rgba(200,16,46,0.15);
}
.game-card.is-hot:hover {
  box-shadow: 0 12px 32px rgba(200,16,46,0.3), 0 4px 12px rgba(0,0,0,0.6);
}

/* Card image area */
.card-art {
  width: 100%;
  aspect-ratio: 1/1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  position: relative;
  overflow: hidden;
}
.card-art::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  z-index: 2;
}
.card-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 1;
}
.card-emoji {
  position: relative;
  z-index: 1;
}
/* Shimmer for hot cards */
.game-card.is-hot .card-art::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.04) 50%, transparent 60%);
  background-size: 200% 200%;
  animation: shimmer 3s infinite;
}
@keyframes shimmer { 0%{background-position:200% 200%} 100%{background-position:-200% -200%} }

/* BONUS TIME badge */
.bonus-badge {

  top: 0; left: 0;
  z-index: 10;
  padding: 4px 9px 4px 7px;
  border-radius: 0 0 10px 0;
  font-size: 0.58rem;
  font-weight: 700;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  letter-spacing: 0.02em;
}

/* HOT tag */
.hot-badge {
  position: absolute;
  top: 0; right: 0;
  z-index: 10;
  background: linear-gradient(135deg, #8b0000, #c8102e);
  color: #fff;
  font-size: 0.6rem;
  font-weight: 700;
  padding: 3px 8px 3px 6px;
  border-radius: 0 0 0 10px;
  box-shadow: -2px 2px 8px rgba(200,16,46,0.5);
  letter-spacing: 0.04em;

/* Card info */
.card-info {
  padding: 7px 9px 4px;
  background: var(--surface);
}
.provider-label {
  font-size: 0.6rem;
  color: var(--gold-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}
.game-title {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

/* RTP banner */
.rtp-banner {
  background: linear-gradient(90deg, #3a0000, #7a0000, #3a0000);
  padding: 6px 9px;
  display: flex;
  align-items: center;
  gap: 5px;

.rtp-banner.hot { background: linear-gradient(90deg, #5a0000, #c8102e, #5a0000); }
.rtp-tag { font-size: 0.58rem; color: #aaa; font-weight: 600; letter-spacing: 0.05em; }

  font-size: 1rem;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.01em;
  text-shadow: 0 0 10px rgba(255,100,100,0.4);
}
.rtp-fire { margin-left: auto; font-size: 0.75rem; }

/* ── FOOTER ── */

  text-align: center;
  padding: 20px;
  font-size: 0.7rem;
  color: var(--text-muted);

  letter-spacing: 0.08em;
}

/* ── SCREENSHOT MODE ── */
body.screenshot-mode #filter-zone { display: none; }
body.screenshot-mode #footer { display: none; }

// ── PRNG
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function seededShuffle(arr, rng) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function getDateSeed(off = 0) {
  const d = new Date(); d.setDate(d.getDate() + off);
  return parseInt(`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`);
}
function providerHash(p) {
  if (p === 'ALL') return 0;
  let h = 0; for (let c of p) h = (Math.imul(31, h) + c.charCodeAt(0)) | 0;
  return Math.abs(h);
}

// ── RTP GENERATION
function genRTP(tag, rng) {
  const isHot = tag === 'hot' || rng() < 0.22;
  if (isHot) return { val: (96.81 + rng() * 2.18).toFixed(2), hot: true };
  return { val: (93.0 + rng() * 3.8).toFixed(2), hot: false };
}

// ── RENDER CARD
function renderCard(game, gameIdx, rtpVal, rtpHot, bonusIdx) {
  const bonus = BONUS_SLOTS[bonusIdx];
  const grad = PROV_GRAD[game.provider] || 'linear-gradient(145deg,#111,#222)';
  const isHot = rtpHot || game.tag === 'hot';
  return `
  <div class="game-card ${isHot ? 'is-hot' : ''}">
    <div class="card-art" style="background:${grad}">
      <div class="bonus-badge" style="background:${bonus.color}">⏰ ${bonus.label}</div>
      ${isHot ? '<div class="hot-badge">🔥 HOT</div>' : ''}
      <span class="card-emoji" style="position:relative;z-index:1">${game.icon}</span>
      <img class="card-img" src="${SUPABASE_BASE}/${encodeURIComponent(game.folder||game.provider)}/${game.image}" alt="${game.name}" loading="lazy" onerror="this.style.display='none';this.previousElementSibling.style.display='block'" onload="this.previousElementSibling.style.display='none'">
    </div>
    <div class="card-info">
      <div class="provider-label">${game.provider}</div>
      <div class="game-title">${game.name}</div>
    </div>
    <div class="rtp-banner ${isHot ? 'hot' : ''}">
      <span class="rtp-tag">RTP</span>
      <span class="rtp-val">${rtpVal}%</span>
      ${isHot ? '<span class="rtp-fire">🔥</span>' : ''}
    </div>
  </div>`;
}

// ── RENDER GAMES
function renderGames() {
  const seed = getDateSeed(dateOffset);
  const pOffset = providerHash(selectedProvider);
  const rng = mulberry32(seed + pOffset);

  let pool = GAMES.filter(g => g.enabled);
  if (selectedProvider !== 'ALL') pool = pool.filter(g => g.provider === selectedProvider);

  const shuffled = seededShuffle(pool, rng);
  const displayed = shuffled.slice(0, Math.min(15, shuffled.length));

  const grid = document.getElementById('game-grid');
  grid.innerHTML = displayed.map(game => {
    const idx = GAMES.indexOf(game);
    const { val, hot } = genRTP(game.tag, rng);
    const bIdx = bonusMap.get(idx) ?? 0;
    return renderCard(game, idx, val, hot, bIdx);
  }).join('');
}

// ── FILTER STATE
function toggleAll() {
  const row = document.getElementById('provider-buttons');
  const btn = document.getElementById('btn-all');
  if (!filterExpanded) {
    filterExpanded = true;
    row.classList.add('open');
    btn.textContent = 'ทั้งหมด ▴';
  } else if (selectedProvider !== 'ALL') {
    resetAll();
  } else {
    filterExpanded = false;
    row.classList.remove('open');
    btn.textContent = 'ทั้งหมด ▾';
  }
}
function selectProvider(name) {
  selectedProvider = name;
  document.querySelectorAll('.prov-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.includes(name))
  );
  document.getElementById('btn-all').classList.remove('active');
  const banner = document.getElementById('active-provider-banner');
  banner.classList.add('visible');
  banner.querySelector('strong').textContent = name;
  renderGames();
}
function resetAll() {
  selectedProvider = 'ALL';
  filterExpanded = false;
  document.getElementById('provider-buttons').classList.remove('open');
  document.getElementById('btn-all').textContent = 'ทั้งหมด ▾';
  document.getElementById('btn-all').classList.add('active');
  document.querySelectorAll('.prov-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('active-provider-banner').classList.remove('visible');
  renderGames();
}

// ── GEAR TOGGLE
function toggleGear() {
  document.getElementById('ctrl-dropdown').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!document.getElementById('ctrl-gear').contains(e.target)) {
    document.getElementById('ctrl-dropdown').classList.remove('open');
  }
});

// ── CONTROLS
document.getElementById('btn-refresh').addEventListener('click', () => {
  dateOffset = (dateOffset + 1) % 7;
  const seed = getDateSeed(dateOffset);
  bonusMap = buildBonusMap(seed);
  document.getElementById('thai-date').textContent = formatThaiDate(dateOffset);
  renderGames();
});
document.getElementById('btn-screenshot').addEventListener('click', () => {
  document.body.classList.toggle('screenshot-mode');
});
document.getElementById('btn-export').addEventListener('click', async () => {
  const el = document.getElementById('capture-zone');
  const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#080808' });
  const a = document.createElement('a');
  a.download = `paruay-rtp-${new Date().toISOString().slice(0,10)}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
});

// ── LOTUS SVG INJECT
function injectLotus() {
  const svgContent = document.getElementById('lotus-svg').innerHTML;
  document.getElementById('lotus-l').innerHTML = svgContent;
  document.getElementById('lotus-r').innerHTML = svgContent;
  document.querySelectorAll('#lotus-l svg, #lotus-r svg').forEach(s => {
    s.setAttribute('fill', '#f5c518');
    s.style.cssText = 'width:100%;height:100%;display:block';
  });
}

// ── INIT
function init() {
  injectLotus();
  const seed = getDateSeed(dateOffset);
  bonusMap = buildBonusMap(seed);
  document.getElementById('thai-date').textContent = formatThaiDate(dateOffset);
  renderGames();
}
document.addEventListener('DOMContentLoaded', init);
</script>
